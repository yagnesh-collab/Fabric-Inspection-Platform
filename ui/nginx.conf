limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ws:10m  rate=10r/m;
limit_req_zone $binary_remote_addr zone=ui:10m  rate=60r/m;

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Remove server version from all responses
    server_tokens off;

    # ── Security headers ──────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws://localhost:3000; frame-ancestors 'none';"
        always;

    # ── Static SPA ────────────────────────────────────────────
    location / {
        limit_req zone=ui burst=20 nodelay;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively, HTML never
        location ~* \.(js|css|woff2?|ico|png|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Consumer API proxy ────────────────────────────────────
    location /api/consumer/ {
        limit_req zone=api burst=10 nodelay;

        limit_except GET {
            deny all;
        }

        proxy_pass http://consumer:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;

        # Never cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        proxy_send_timeout    10s;
    }

    # ── Jetson-sim API proxy ──────────────────────────────────
    location /api/jetson/ {
        limit_req zone=api burst=10 nodelay;

        limit_except GET {
            deny all;
        }

        proxy_pass http://jetson-sim:8001/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        proxy_send_timeout    10s;
    }

    # ── WebSocket stream ──────────────────────────────────────
    location /ws/stream {
        limit_req zone=ws burst=5 nodelay;

        proxy_pass http://jetson-sim:8001/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;

        proxy_hide_header Server;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block common attack paths ─────────────────────────────
    location ~* (wp-admin|phpMyAdmin|\.php|\.asp|\.aspx|\.env|\.git) {
        deny all;
        return 404;
    }

    # ── Custom error pages (no info leakage) ─────────────────
    error_page 400 401 403 404 /index.html;
    error_page 429 /index.html;
    error_page 500 502 503 504 /index.html;
}
