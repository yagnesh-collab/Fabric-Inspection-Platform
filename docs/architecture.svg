<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="jetsonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f2744;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rabbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1942;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d0f28;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="consumerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2218;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1a33;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0d33;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#060a14;stop-opacity:1"/>
    </linearGradient>

    <!-- Glows -->
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c084fc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="640" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="225" y1="0" x2="225" y2="640"/>
    <line x1="450" y1="0" x2="450" y2="640"/>
    <line x1="675" y1="0" x2="675" y2="640"/>
  </g>

  <!-- ═══ JETSON-SIM NODE ═══ -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="40" width="200" height="130" rx="12" fill="url(#jetsonGrad)" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  <rect x="30" y="40" width="200" height="4" rx="2" fill="#38bdf8" opacity="0.9"/>
  <!-- Icon -->
  <rect x="46" y="58" width="22" height="16" rx="3" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="62" cy="66" r="4" fill="#38bdf8" opacity="0.7"/>
  <line x1="72" y1="55" x2="72" y2="78" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <text x="80" y="68" fill="#e2e8f0" font-size="12" font-weight="700">jetson-sim</text>
  <text x="80" y="82" fill="#94a3b8" font-size="9">python:3.12-slim</text>
  <text x="46" y="104" fill="#94a3b8" font-size="9">422 real fabric images</text>
  <text x="46" y="118" fill="#94a3b8" font-size="9">WebSocket stream</text>
  <text x="46" y="132" fill="#94a3b8" font-size="9">AMQP publisher</text>
  <text x="46" y="148" fill="#38bdf8" font-size="9" font-weight="600">port 8001  (internal)</text>

  <!-- ═══ RABBITMQ NODE ═══ -->
  <g filter="url(#cardShadow)">
    <rect x="340" y="40" width="200" height="130" rx="12" fill="url(#rabbitGrad)" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  <rect x="340" y="40" width="200" height="4" rx="2" fill="#fb923c" opacity="0.9"/>
  <rect x="356" y="58" width="18" height="18" rx="3" fill="none" stroke="#fb923c" stroke-width="1.5"/>
  <line x1="360" y1="67" x2="370" y2="67" stroke="#fb923c" stroke-width="1.5"/>
  <line x1="360" y1="71" x2="366" y2="71" stroke="#fb923c" stroke-width="1"/>
  <text x="384" y="68" fill="#e2e8f0" font-size="12" font-weight="700">RabbitMQ</text>
  <text x="384" y="82" fill="#94a3b8" font-size="9">rabbitmq:3.13-alpine</text>
  <text x="356" y="104" fill="#94a3b8" font-size="9">queue: "events"</text>
  <text x="356" y="118" fill="#94a3b8" font-size="9">durable + persistent</text>
  <text x="356" y="132" fill="#94a3b8" font-size="9">at-least-once delivery</text>
  <text x="356" y="148" fill="#fb923c" font-size="9" font-weight="600">AMQP 5672  |  UI 15672</text>

  <!-- ═══ CONSUMER NODE ═══ -->
  <g filter="url(#cardShadow)">
    <rect x="340" y="260" width="200" height="130" rx="12" fill="url(#consumerGrad)" stroke="#4ade80" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  <rect x="340" y="260" width="200" height="4" rx="2" fill="#4ade80" opacity="0.9"/>
  <path d="M356,278 h18 v4 l-4,0 v10 h-10 v-10 l-4,0 z" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <text x="384" y="288" fill="#e2e8f0" font-size="12" font-weight="700">consumer</text>
  <text x="384" y="302" fill="#94a3b8" font-size="9">python:3.12-slim</text>
  <text x="356" y="322" fill="#94a3b8" font-size="9">drains RabbitMQ queue</text>
  <text x="356" y="336" fill="#94a3b8" font-size="9">writes to PostgreSQL</text>
  <text x="356" y="350" fill="#94a3b8" font-size="9">GET /health  GET /events</text>
  <text x="356" y="368" fill="#4ade80" font-size="9" font-weight="600">port 8000  (internal)</text>

  <!-- ═══ POSTGRESQL NODE ═══ -->
  <g filter="url(#cardShadow)">
    <rect x="340" y="480" width="200" height="130" rx="12" fill="url(#pgGrad)" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  <rect x="340" y="480" width="200" height="4" rx="2" fill="#60a5fa" opacity="0.9"/>
  <ellipse cx="365" cy="498" rx="9" ry="4" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="356" y1="498" x2="356" y2="510" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="374" y1="498" x2="374" y2="510" stroke="#60a5fa" stroke-width="1.5"/>
  <ellipse cx="365" cy="510" rx="9" ry="4" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="388" y="499" fill="#e2e8f0" font-size="12" font-weight="700">PostgreSQL 16</text>
  <text x="388" y="513" fill="#94a3b8" font-size="9">postgres:16-alpine</text>
  <text x="356" y="534" fill="#94a3b8" font-size="9">database: nextex</text>
  <text x="356" y="548" fill="#94a3b8" font-size="9">table: events (1,640 rows)</text>
  <text x="356" y="562" fill="#94a3b8" font-size="9">named volume: postgres_data</text>
  <text x="356" y="580" fill="#60a5fa" font-size="9" font-weight="600">port 5432  (internal)</text>

  <!-- ═══ UI NODE ═══ -->
  <g filter="url(#cardShadow)">
    <rect x="660" y="250" width="210" height="180" rx="12" fill="url(#uiGrad)" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  <rect x="660" y="250" width="210" height="4" rx="2" fill="#c084fc" opacity="0.9"/>
  <rect x="676" y="268" width="20" height="14" rx="2" fill="none" stroke="#c084fc" stroke-width="1.5"/>
  <line x1="680" y1="265" x2="680" y2="268" stroke="#c084fc" stroke-width="1.5"/>
  <line x1="692" y1="265" x2="692" y2="268" stroke="#c084fc" stroke-width="1.5"/>
  <text x="704" y="279" fill="#e2e8f0" font-size="12" font-weight="700">UI  (nginx)</text>
  <text x="704" y="293" fill="#94a3b8" font-size="9">nginx:alpine + React 18</text>
  <text x="676" y="316" fill="#94a3b8" font-size="9">CameraFeed  (WebSocket)</text>
  <text x="676" y="330" fill="#94a3b8" font-size="9">HealthPanel  (polls /health)</text>
  <text x="676" y="344" fill="#94a3b8" font-size="9">AlertList   (derived state)</text>
  <text x="676" y="360" fill="#94a3b8" font-size="9">Adminer  :8080</text>
  <text x="676" y="374" fill="#94a3b8" font-size="9">Swagger  /api/consumer/docs</text>
  <rect x="676" y="386" width="178" height="28" rx="6" fill="#c084fc" fill-opacity="0.15" stroke="#c084fc" stroke-width="1" stroke-opacity="0.4"/>
  <text x="765" y="404" fill="#c084fc" font-size="10" font-weight="700" text-anchor="middle">port 3000  ← host access</text>

  <!-- ═══ ANIMATED ARROWS ═══ -->

  <!-- Arrow 1: Jetson → RabbitMQ (AMQP publish) -->
  <path d="M230,90 C280,90 295,90 335,90" fill="none" stroke="#fb923c" stroke-width="2" stroke-opacity="0.5" marker-end="url(#arrowOrange)"/>
  <circle r="5" fill="#fb923c" filter="url(#glow-orange)">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M230,90 C280,90 295,90 335,90"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="5" fill="#fb923c" filter="url(#glow-orange)">
    <animateMotion dur="2.2s" repeatCount="indefinite" begin="1.1s" path="M230,90 C280,90 295,90 335,90"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite" begin="1.1s"/>
  </circle>
  <!-- Label: AMQP — above the arrow -->
  <rect x="255" y="70" width="74" height="14" rx="4" fill="#2d1200" fill-opacity="0.85"/>
  <text x="292" y="81" fill="#fb923c" font-size="9" font-weight="700" text-anchor="middle">AMQP  events</text>
  <!-- Sub-label: event types — below the arrow -->
  <rect x="230" y="95" width="112" height="13" rx="3" fill="#1a0800" fill-opacity="0.8"/>
  <text x="286" y="105" fill="#fb923c" font-size="8" text-anchor="middle" opacity="0.85">threshold / new_anomaly_class</text>

  <!-- Arrow 2: Jetson → UI (WebSocket frames) — curved along y=220 -->
  <path d="M130,170 C130,228 765,228 765,254" fill="none" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.5" marker-end="url(#arrowBlue)"/>
  <circle r="5" fill="#38bdf8" filter="url(#glow-blue)">
    <animateMotion dur="3s" repeatCount="indefinite" path="M130,170 C130,228 765,228 765,254"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="5" fill="#38bdf8" filter="url(#glow-blue)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="1.5s" path="M130,170 C130,228 765,228 765,254"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <!-- Label: below the curve -->
  <rect x="366" y="234" width="168" height="14" rx="4" fill="#001a2d" fill-opacity="0.9"/>
  <text x="450" y="245" fill="#38bdf8" font-size="9" font-weight="700" text-anchor="middle">WebSocket  (JPEG frames  ~1.25 fps)</text>

  <!-- Arrow 3: RabbitMQ → Consumer (AMQP consume) — vertical -->
  <path d="M440,172 L440,256" fill="none" stroke="#4ade80" stroke-width="2" stroke-opacity="0.5" marker-end="url(#arrowGreen)"/>
  <circle r="5" fill="#4ade80" filter="url(#glow-green)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M440,172 L440,256"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="5" fill="#4ade80" filter="url(#glow-green)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.9s" path="M440,172 L440,256"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <!-- Label: to the RIGHT of the arrow -->
  <rect x="450" y="203" width="86" height="14" rx="4" fill="#001a0d" fill-opacity="0.9"/>
  <text x="493" y="214" fill="#4ade80" font-size="9" font-weight="700" text-anchor="middle">consume + ack</text>

  <!-- Arrow 4: Consumer → PostgreSQL (asyncpg) — vertical -->
  <path d="M440,392 L440,476" fill="none" stroke="#60a5fa" stroke-width="2" stroke-opacity="0.5" marker-end="url(#arrowBlue)"/>
  <circle r="5" fill="#60a5fa" filter="url(#glow-blue)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M440,392 L440,476"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="5" fill="#60a5fa" filter="url(#glow-blue)">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.75s" path="M440,392 L440,476"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
  </circle>
  <!-- Label: to the RIGHT of the arrow -->
  <rect x="450" y="426" width="102" height="14" rx="4" fill="#00102d" fill-opacity="0.9"/>
  <text x="501" y="437" fill="#60a5fa" font-size="9" font-weight="700" text-anchor="middle">INSERT  (asyncpg)</text>

  <!-- Arrow 5: Consumer → UI  GET /health poll — horizontal -->
  <path d="M540,325 C610,325 640,325 656,325" fill="none" stroke="#c084fc" stroke-width="2" stroke-opacity="0.5" marker-end="url(#arrowPurple)"/>
  <circle r="5" fill="#c084fc">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.5s" path="M540,325 C610,325 640,325 656,325"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <!-- Label: above the arrow -->
  <rect x="545" y="311" width="106" height="14" rx="4" fill="#12002d" fill-opacity="0.9"/>
  <text x="598" y="322" fill="#c084fc" font-size="9" font-weight="700" text-anchor="middle">GET /health  every 3s</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="30" y="470" width="270" height="150" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>
  <text x="44" y="490" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="1">DATA FLOWS</text>
  <line x1="44" y1="507" x2="84" y2="507" stroke="#fb923c" stroke-width="2"/>
  <circle cx="64" cy="507" r="4" fill="#fb923c"/>
  <text x="92" y="511" fill="#e2e8f0" font-size="10">AMQP events  (persist on broker restart)</text>
  <line x1="44" y1="525" x2="84" y2="525" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="64" cy="525" r="4" fill="#38bdf8"/>
  <text x="92" y="529" fill="#e2e8f0" font-size="10">WebSocket  (JPEG frames ~1.25 fps)</text>
  <line x1="44" y1="543" x2="84" y2="543" stroke="#4ade80" stroke-width="2"/>
  <circle cx="64" cy="543" r="4" fill="#4ade80"/>
  <text x="92" y="547" fill="#e2e8f0" font-size="10">AMQP consume  (ack after DB write)</text>
  <line x1="44" y1="561" x2="84" y2="561" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="64" cy="561" r="4" fill="#60a5fa"/>
  <text x="92" y="565" fill="#e2e8f0" font-size="10">asyncpg  (INSERT INTO events)</text>
  <line x1="44" y1="579" x2="84" y2="579" stroke="#c084fc" stroke-width="2"/>
  <circle cx="64" cy="579" r="4" fill="#c084fc"/>
  <text x="92" y="583" fill="#e2e8f0" font-size="10">HTTP poll  (GET /health every 3s)</text>

  <!-- Title -->
  <text x="450" y="22" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="2">NEXTEX FABRIC INSPECTION  —  SYSTEM ARCHITECTURE</text>
</svg>
